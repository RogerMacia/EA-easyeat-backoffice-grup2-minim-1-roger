<h2>Organizations</h2>

<p> <input
  type="text"
  [formControl]="searchControl"
  placeholder="Search by name..."
/> </p>

<p *ngIf="loading">Loading...</p>
<p *ngIf="!loading && errorMsg">{{ errorMsg }}</p>

<ul class="list" *ngIf="!loading && !errorMsg && organizations.length > 0">
  <li class="card" *ngFor="let org of visibleOrgs; trackBy: trackById"> 
    <div>
      <span class="name", type="name">
        <p calss="name">{{
          expanded[org._id] || org.name.length <= 15
            ? org.name
            : (org.name | slice:0:15) + '...'
        }}</p>
      </span>

      <button *ngIf="org.name.length > 15"
              class="btn"
              (click)="toggleExpand(org._id)">
        {{ expanded[org._id] ? 'Show less' : 'Show more' }}
      </button>
    </div>

    <div>
      <span class="muted">{{ org._id }}</span>

      <button type="button"
              class="btn"
              (click)="edit(org)">
        Edit
      </button>

      <button type="button"
              class="btn delete-btn"
              (click)="confirmDelete(org._id, org.name)">
        X
      </button>
    </div>

  </li>
</ul>

<button 
    *ngIf="!showAllOrg && organizations.length > limit"
    class="btn"
    (click)="showMore()">
  Show more
</button>
<button 
  *ngIf="showAllOrg"
  class="btn"
  (click)="showAllOrg = false">

  Show less
</button>

<p *ngIf="!loading && !errorMsg && organizations.length === 0">
  No organizations.
</p>

<button type="button" class="btn" (click)="showOrgForm()">
  Add
</button>

<div *ngIf="showForm" class="card">

  <h3>{{ editting ? 'Edit organization' : 'New organization' }}</h3>

  <form [formGroup]="organizationForm" (ngSubmit)="save()">

    <label>Name:</label>
    <input type="text" formControlName="name" />

    <button type="submit"
            class="btn"
            [disabled]="organizationForm.invalid">
      {{ editting ? 'Update' : 'Save' }}
    </button>
  </form>
</div>

<!-- Botón para recargar la lista -->
<button type="button" class="btn" (click)="load()">
  Refresh
</button>
